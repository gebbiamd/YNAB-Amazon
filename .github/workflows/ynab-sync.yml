name: YNAB Amazon Sync

on:
  workflow_dispatch:
    inputs:
      apply:
        description: "Write updates to YNAB (true) or dry-run (false)"
        required: true
        default: "false"
        type: choice
        options: ["false", "true"]
      months_back:
        description: "Months back to scan"
        required: true
        default: "1"
        type: choice
        options: ["1", "2", "3", "6"]
      coverage:
        description: "gaps (safer) or all"
        required: true
        default: "gaps"
        type: choice
        options: ["gaps", "all"]
      depth:
        description: "normal (faster) or deep"
        required: true
        default: "normal"
        type: choice
        options: ["normal", "deep"]
      days_back:
        description: "Optional explicit days_back override (blank to auto-calc)"
        required: false
        default: ""
        type: string
      split_strategy:
        description: "Split strategy"
        required: true
        default: "conservative"
        type: choice
        options: ["off", "conservative", "all"]
  schedule:
    # Every 6 hours at :30 UTC (4 runs/day)
    - cron: "30 */6 * * *"

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      # Manual-dispatch inputs
      DISPATCH_APPLY: ${{ inputs.apply }}
      DISPATCH_MONTHS_BACK: ${{ inputs.months_back }}
      DISPATCH_COVERAGE: ${{ inputs.coverage }}
      DISPATCH_DEPTH: ${{ inputs.depth }}
      DISPATCH_DAYS_BACK: ${{ inputs.days_back }}
      DISPATCH_SPLIT_STRATEGY: ${{ inputs.split_strategy }}

      # Scheduled-run defaults (set in GitHub Repository Variables; these are fallbacks)
      SYNC_APPLY: ${{ vars.SYNC_APPLY }}
      SYNC_MONTHS_BACK: ${{ vars.SYNC_MONTHS_BACK }}
      SYNC_COVERAGE: ${{ vars.SYNC_COVERAGE }}
      SYNC_DEPTH: ${{ vars.SYNC_DEPTH }}
      SYNC_DAYS_BACK: ${{ vars.SYNC_DAYS_BACK }}
      SYNC_SPLIT_STRATEGY: ${{ vars.SYNC_SPLIT_STRATEGY }}

      # Credentials/secrets
      YNAB_API_KEY: ${{ secrets.YNAB_API_KEY }}
      YNAB_BUDGET_ID: ${{ secrets.YNAB_BUDGET_ID }}
      YNAB_ACCOUNT_ID: ${{ secrets.YNAB_ACCOUNT_ID }}
      YNAB_PAYEE_NAME_TO_BE_PROCESSED: ${{ secrets.YNAB_PAYEE_NAME_TO_BE_PROCESSED }}
      YNAB_PAYEE_NAME_PROCESSING_COMPLETED: ${{ secrets.YNAB_PAYEE_NAME_PROCESSING_COMPLETED }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      GMAIL_CREDENTIALS_JSON: ${{ secrets.GMAIL_CREDENTIALS_JSON }}
      GMAIL_TOKEN_JSON: ${{ secrets.GMAIL_TOKEN_JSON }}
      GMAIL_QUERY: ${{ vars.GMAIL_QUERY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            beautifulsoup4 \
            flask \
            google-api-python-client \
            google-auth-httplib2 \
            google-auth-oauthlib \
            matplotlib

      - name: Validate required secrets
        run: |
          set -euo pipefail
          missing=0
          for k in YNAB_API_KEY YNAB_BUDGET_ID GMAIL_CREDENTIALS_JSON GMAIL_TOKEN_JSON; do
            if [ -z "${!k:-}" ]; then
              echo "::error::Missing required secret: $k"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Prepare OAuth files
        run: |
          set -euo pipefail
          printf '%s' "$GMAIL_CREDENTIALS_JSON" > credentials.json
          printf '%s' "$GMAIL_TOKEN_JSON" > token.json

      - name: Run sync
        run: |
          set -euo pipefail
          mkdir -p logs

          # Resolve runtime params: workflow_dispatch input first, else repo variable, else fallback.
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            APPLY="${DISPATCH_APPLY:-false}"
            MONTHS_BACK="${DISPATCH_MONTHS_BACK:-1}"
            COVERAGE="${DISPATCH_COVERAGE:-gaps}"
            DEPTH="${DISPATCH_DEPTH:-normal}"
            DAYS_BACK="${DISPATCH_DAYS_BACK:-}"
            SPLIT_STRATEGY="${DISPATCH_SPLIT_STRATEGY:-conservative}"
          else
            APPLY="${SYNC_APPLY:-false}"
            MONTHS_BACK="${SYNC_MONTHS_BACK:-1}"
            COVERAGE="${SYNC_COVERAGE:-gaps}"
            DEPTH="${SYNC_DEPTH:-normal}"
            DAYS_BACK="${SYNC_DAYS_BACK:-}"
            SPLIT_STRATEGY="${SYNC_SPLIT_STRATEGY:-conservative}"
          fi

          export ynab_api_key="$YNAB_API_KEY"
          export ynab_budget_id="$YNAB_BUDGET_ID"
          export ynab_account_id="${YNAB_ACCOUNT_ID:-}"
          export ynab_payee_name_to_be_processed="${YNAB_PAYEE_NAME_TO_BE_PROCESSED:-}"
          export ynab_payee_name_processing_completed="${YNAB_PAYEE_NAME_PROCESSING_COMPLETED:-}"
          export openai_api_key="${OPENAI_API_KEY:-}"
          if [ -n "${OPENAI_API_KEY:-}" ]; then
            export use_ai_summarization="true"
          fi
          export ynab_use_splits="true"
          export ynab_split_strategy="$SPLIT_STRATEGY"
          export GMAIL_QUERY="${GMAIL_QUERY:-in:\"YNAB Amazon\" newer_than:30d}"

          ARGS=(03_sync_amazon_to_ynab.py --months-back "$MONTHS_BACK" --coverage "$COVERAGE" --depth "$DEPTH")
          if [ -n "$DAYS_BACK" ]; then
            ARGS+=(--days-back "$DAYS_BACK")
          fi
          if [ "${APPLY}" = "true" ]; then
            ARGS+=(--apply)
          fi

          echo "Running: python ${ARGS[*]}"
          python "${ARGS[@]}"

      - name: Upload logs artifact
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: ynab-sync-logs-${{ github.run_number }}
          path: |
            logs/*.log
            logs/ai_cache.json
          if-no-files-found: ignore
