name: Budget Report Pages

on:
  workflow_dispatch:
  schedule:
    - cron: "0 13 * * 1"

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PAGES_BASE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
      YNAB_API_KEY: ${{ secrets.YNAB_API_KEY }}
      YNAB_BUDGET_ID: ${{ secrets.YNAB_BUDGET_ID }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install \
            flask \
            matplotlib \
            google-api-python-client \
            google-auth-httplib2 \
            google-auth-oauthlib

      - name: Validate required secrets
        run: |
          set -euo pipefail
          missing=0
          for k in YNAB_API_KEY YNAB_BUDGET_ID OPENAI_API_KEY; do
            if [ -z "${!k:-}" ]; then
              echo "::error::Missing required secret: $k"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Restore previous published history
        run: |
          set -euo pipefail
          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            git fetch origin gh-pages
            rm -rf /tmp/gh-pages-prev
            git worktree add /tmp/gh-pages-prev origin/gh-pages
            mkdir -p reports/history
            if [ -f /tmp/gh-pages-prev/report_index.json ]; then
              cp /tmp/gh-pages-prev/report_index.json reports/report_index.json
            fi
            if [ -d /tmp/gh-pages-prev/report ]; then
              find /tmp/gh-pages-prev/report -mindepth 2 -maxdepth 2 -name index.html | while read -r report_file; do
                report_id="$(basename "$(dirname "$report_file")")"
                cp "$report_file" "reports/history/report_${report_id}.html"
              done
            fi
            git worktree remove /tmp/gh-pages-prev --force
          fi

      - name: Generate report
        run: |
          set -euo pipefail
          export ynab_api_key="$YNAB_API_KEY"
          export ynab_budget_id="$YNAB_BUDGET_ID"
          export openai_api_key="$OPENAI_API_KEY"
          export DASHBOARD_BASE_URL="$PAGES_BASE_URL"
          python 04_weekly_budget_report.py --skip-email

      - name: Build static site
        run: |
          set -euo pipefail
          python 06_build_budget_static_site.py --report-dir reports --site-dir site --base-url "$PAGES_BASE_URL"

      - name: Publish to gh-pages
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -rf /tmp/gh-pages-publish
          git worktree add -B gh-pages /tmp/gh-pages-publish
          find /tmp/gh-pages-publish -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -R site/. /tmp/gh-pages-publish/
          cd /tmp/gh-pages-publish
          git add --all
          if git diff --cached --quiet; then
            echo "No site changes to publish."
            exit 0
          fi
          git commit -m "Publish budget report site"
          git push origin gh-pages --force
